---
name: 'Docker Swarm Deploy'
description: 'Update or create a Docker service in Swarm'
inputs:
  host:
    description: 'Server host'
    required: true
  user:
    description: 'SSH username'
    required: true
  key:
    description: 'SSH key'
    required: true
  service_name:
    description: 'The name of the service'
    required: true
  image:
    description: 'Docker image'
    required: true
  env_file:
    description: 'Path to the .env file on the server'
    required: true
  prefix:
    description: 'Prefix for environment variables (Redis, Cache, etc.)'
    required: true
  command:
    description: 'Command to run'
    default: ''
  replicas:
    description: 'Number of replicas'
    default: '1'

runs:
  using: "composite"
  steps:
    - name: Deploy Service via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        script: |
          # Sanitizar entradas removendo quebras de linha extras do YAML
          SERVICE_NAME=$(echo "${{ inputs.service_name }}" | xargs)
          IMAGE=$(echo "${{ inputs.image }}" | xargs)
          ENV_FILE=$(echo "${{ inputs.env_file }}" | xargs)
          PREFIX=$(echo "${{ inputs.prefix }}" | xargs)
          COMMAND=$(echo "${{ inputs.command }}" | xargs)
          SERVICE_REPLICAS=$(echo "${{ inputs.replicas }}" | xargs)

          # Verificar se o arquivo .env existe no servidor
          if [ ! -f "$ENV_FILE" ]; then
            echo "⚠️ Arquivo $ENV_FILE não encontrado. \
              Tentando fallback para .env padrão..."
            ENV_DIR=$(dirname "$ENV_FILE")
            if [ -f "$ENV_DIR/.env" ]; then
              ENV_FILE="$ENV_DIR/.env"
              echo "✅ Usando fallback: $ENV_FILE"
            else
              echo "❌ Erro: Nenhum arquivo .env encontrado em $ENV_DIR"
              exit 1
            fi
          fi

          if docker service inspect "${SERVICE_NAME}" >/dev/null 2>&1; then
            echo "🔄 Atualizando ${SERVICE_NAME}..."
            docker service update --force \
              --image "${IMAGE}" \
              --mount-rm /var/www/html/.env \
              --mount-add \
                type=bind,src="${ENV_FILE}",dst=/var/www/html/.env \
              --env-rm REDIS_PREFIX \
              --env-rm CACHE_PREFIX \
              --env-rm SESSION_PREFIX \
              --env-rm HORIZON_PREFIX \
              --env-rm APP_NAME \
              --env-add REDIS_PREFIX="${PREFIX}" \
              --env-add CACHE_PREFIX="${PREFIX}cache" \
              --env-add SESSION_PREFIX="${PREFIX}session" \
              --env-add HORIZON_PREFIX="${PREFIX}horizon:" \
              --env-add APP_NAME="${SERVICE_NAME}" \
              --replicas "${SERVICE_REPLICAS}" \
              --update-order start-first \
              "${SERVICE_NAME}" || { \
                echo "❌ Erro no deploy! Logs do serviço:"; \
                docker service logs "${SERVICE_NAME}" --tail 20; \
                exit 1; \
              }
          else
            echo "🚀 Criando ${SERVICE_NAME}..."
            docker service create \
              --name "${SERVICE_NAME}" \
              --replicas "${SERVICE_REPLICAS}" \
              --network web \
              --host host.docker.internal:host-gateway \
              --mount type=bind,src="${ENV_FILE}",dst=/var/www/html/.env \
              --env REDIS_PREFIX="${PREFIX}" \
              --env CACHE_PREFIX="${PREFIX}cache" \
              --env SESSION_PREFIX="${PREFIX}session" \
              --env HORIZON_PREFIX="${PREFIX}horizon:" \
              --env APP_NAME="${SERVICE_NAME}" \
              "${IMAGE}" ${COMMAND} || { \
                echo "❌ Erro na criação! Logs do serviço:"; \
                docker service logs "${SERVICE_NAME}" --tail 20; \
                exit 1; \
              }
          fi
