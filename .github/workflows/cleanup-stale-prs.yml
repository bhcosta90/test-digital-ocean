name: PR Auto Cleanup (24h)

on:
  schedule:
    - cron: '0 * * * *' # Roda a cada hora
  workflow_dispatch: # Permite rodar manualmente

env:
  DOMAIN_BASE: bhcosta90.dev.br

jobs:
  cleanup-stale-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old PR containers and images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            REPO="${{ github.event.repository.name }}"
            CADDYFILE="$HOME/Caddyfile"
            
            echo "🔍 Checking for stale PR containers (older than 24h)..."
            
            # Listar containers que começam com o nome do repo e não são as branches fixas (main, develop, sandbox)
            # E que foram criados há mais de 24 horas
            STALE_CONTAINERS=$(docker ps -a --format '{{.Names}} {{.CreatedAt}}' | grep "^${REPO}-" | grep -vE "${REPO}-(main|develop|sandbox)" | while read line; do
                NAME=$(echo $line | awk '{print $1}')
                CREATED_AT=$(echo $line | awk '{print $2" "$3" "$4}')
                # Converter para timestamp (funciona em linux comum)
                CREATE_TS=$(date -d "$CREATED_AT" +%s)
                NOW_TS=$(date +%s)
                DIFF=$(( (NOW_TS - CREATE_TS) / 3600 ))
                
                if [ $DIFF -ge 24 ]; then
                    echo $NAME
                fi
            done)

            if [ -z "$STALE_CONTAINERS" ]; then
                echo "✅ No stale containers found."
                exit 0
            fi

            for CONTAINER in $STALE_CONTAINERS; do
                echo "🧹 Cleaning up stale container: $CONTAINER"
                
                # Extrair o nome da branch/PR do nome do container
                # O formato é REPO-BRANCH-app ou REPO-BRANCH-worker
                # Vamos tentar pegar a parte da branch
                BRANCH_PART=$(echo $CONTAINER | sed "s/^${REPO}-//" | sed 's/-app$//' | sed 's/-worker$//')
                DOMAIN="$BRANCH_PART.${{ env.DOMAIN_BASE }}"
                
                # Parar e remover container
                docker rm -f $CONTAINER >/dev/null 2>&1 || true
                
                # Se for o container de app, remove do Caddy também
                if [[ $CONTAINER == *"-app" ]]; then
                    echo "🌐 Removing $DOMAIN from Caddyfile"
                    sed -i "/$DOMAIN {/,/}/d" "$CADDYFILE"
                    
                    # Tentar remover a imagem também
                    USER="${{ secrets.DOCKERHUB_USERNAME }}"
                    IMAGE="$USER/$REPO:$BRANCH_PART"
                    docker rmi $IMAGE >/dev/null 2>&1 || true
                fi
            done

            docker restart caddy || true
            echo "✅ Cleanup cycle finished."
