name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            whoami

      - name: Build image
        run: docker build -t project-test --target app .

      - name: Save image
        run: |
          docker save project-test -o image.tar
          sudo chown $USER:$USER image.tar

      - name: Debug
        run: ls -lh image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy to server
        run: |
          sudo apt-get update && sudo apt-get install -y rsync
          
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            image.tar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/image.tar

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker load < /tmp/image.tar
            
            docker rm -f project-test || true

            docker run -d \
              --name project-test \
              -e APP_KEY='${{ secrets.APP_KEY }}' \
              -e APP_DEBUG=true \
              -e DB_CONNECTION=mysql \
              -e DB_HOST=host.docker.internal \
              -e DB_USERNAME=test-digital-ocean \
              -e DB_DATABASE=test-digital-ocean \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              --add-host=host.docker.internal:host-gateway \
              -p 8080:80 \
              project-test