---
name: Deploy

"on":
  push:
    branches: [main, sandbox, develop]

env:
  ENV_BASE: .env
  REPLICAS_CONFIG: "main:3,sandbox:2"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${{ github.ref_name }}"
          echo "IMAGE=$DOCKER_USER/$REPO:$TAG" >> $GITHUB_ENV

      - name: Update version.txt
        run: |
          echo "${{ github.sha }}" | cut -c1-7 > version.txt
          date +" %Y-%m-%d %H:%M:%S" >> version.txt

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        uses: ./.github/actions/docker-build-push
        with:
          image_name: ${{ env.IMAGE }}
          push_latest: 'true'

      - name: Prepare server and setup environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            REPO="${{ github.event.repository.name }}"
            USER="${{ secrets.DOCKERHUB_USERNAME }}"
            IMAGE="$USER/$REPO:$BRANCH"

            echo "🚀 Preparing Deploy: $REPO-$BRANCH"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "$USER" --password-stdin
            docker pull "$IMAGE"
            docker image prune -a -f || true
            docker network inspect web >/dev/null 2>&1 || \
              docker network create --driver overlay web

            FINAL_ENV="$HOME/$REPO/.env-$BRANCH"
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
                if [ ! -f "$FINAL_ENV" ]; then
                    FINAL_ENV="$HOME/$REPO/.env-production"
                fi
            fi

            if [ ! -f "$FINAL_ENV" ]; then
              FINAL_ENV="$HOME/$REPO/.env"
            fi

            if [ ! -f "$FINAL_ENV" ]; then
              echo "❌ Nenhum arquivo .env encontrado em $HOME/$REPO/"
              exit 1
            fi
            echo "✅ Server prepared for $BRANCH"

      - name: Parse Replicas
        id: replicas
        shell: bash
        run: |
          REPLICAS=1
          IFS=',' read -ra CONFIG_ARRAY <<< "${{ env.REPLICAS_CONFIG }}"
          for item in "${CONFIG_ARRAY[@]}"; do
            IFS=':' read -ra PAIR <<< "$item"
            if [[ "${PAIR[0]}" == "${{ github.ref_name }}" ]]; then
              REPLICAS="${PAIR[1]}"
              break
            fi
          done
          echo "count=$REPLICAS" >> $GITHUB_OUTPUT

      - name: Deploy Worker
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-worker
          image: ${{ env.IMAGE }}
          env_file: >-
            $HOME/${{ github.event.repository.name }}/.env-${{
            github.ref_name }}
          prefix: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-
          command: "worker"
          replicas: "1"

      - name: Deploy App
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-app
          image: ${{ env.IMAGE }}
          env_file: >-
            $HOME/${{ github.event.repository.name }}/.env-${{
            github.ref_name }}
          prefix: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-
          replicas: ${{ steps.replicas.outputs.count }}

      - name: Finalize Deploy
        run: |
          REPO="${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          echo "✅ Deploy finalizado: $REPO-$BRANCH"
