name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            whoami

      - name: Build image
        run: docker build -t project-test --target app .

      - name: Save image
        run: |
          docker save project-test -o image.tar
          sudo chown $USER:$USER image.tar

      - name: Debug
        run: ls -lh image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy to server
        run: |
          sudo apt-get update && sudo apt-get install -y rsync
          
          # Copiar imagem
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            image.tar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/image.tar

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker load < /tmp/image.tar
            
            # Subir App
            docker rm -f project-test || true
            docker run -d \
              --name project-test \
              --restart unless-stopped \
              -v ~/.env-test-digital-ocean:/var/www/html/.env \
              --add-host=host.docker.internal:host-gateway \
              -l traefik.enable=true \
              -l traefik.http.routers.app.rule=Host('bhcosta90.dev.br') \
              -l traefik.http.services.app.loadbalancer.server.port=80 \
              project-test

            # Subir Worker
            docker rm -f project-test-worker || true
            docker run -d \
              --name project-test-worker \
              --restart unless-stopped \
              -v ~/.env-test-digital-ocean:/var/www/html/.env \
              -e APP_DEBUG=false \
              --add-host=host.docker.internal:host-gateway \
              project-test worker