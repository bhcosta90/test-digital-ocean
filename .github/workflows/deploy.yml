name: Deploy

on:
  push:
    branches: [main, sandbox, develop]

env:
  ENV_BASE: ${{ github.event.repository.name }}
  REPLICAS_CONFIG: "main:3,sandbox:2"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # рџ“Ґ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # рџ”ђ SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # рџЏ·пёЏ Nome da imagem
      - name: Set image name
        run: |
          echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.ref_name }}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest" >> $GITHUB_ENV

      # рџЏ·пёЏ Update version.txt
      - name: Update version.txt with commit hash
        run: |
          echo "$(echo ${{ github.sha }} | cut -c1-7) $(date +'%Y-%m-%d %H:%M:%S')" > version.txt

      # рџ”ђ Login Docker Hub
      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # рџЏ—пёЏ Build
      - name: Build da imagem
        run: docker build -t $IMAGE --target app .

      # рџЏ·пёЏ Tag latest (opcional mas recomendado)
      - name: Tag latest
        run: docker tag $IMAGE $IMAGE_LATEST

      # рџ“¤ Push
      - name: Push da imagem
        run: |
          docker push $IMAGE
          docker push $IMAGE_LATEST

      # рџљЂ Deploy no servidor
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          script: |
            set -e

            BRANCH=${{ github.ref_name }}
            REPO=${{ github.event.repository.name }}
            USER=${{ secrets.DOCKERHUB_USERNAME }}

            APP_NAME="$REPO-$BRANCH"
            IMAGE="$USER/$REPO:$BRANCH"
            ENV_BASE="${{ env.ENV_BASE }}"

            echo "рџљЂ Deploying $APP_NAME"

            # рџ”‘ Login no Docker Hub (no servidor)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$USER" --password-stdin

            echo "рџ“¦ Baixando imagem..."
            docker pull $IMAGE

            # рџ”Ґ Limpeza opcional (evita encher disco)
            docker image prune -a -f || true

            # Garantir network
            docker network inspect web >/dev/null 2>&1 || docker network create --driver overlay web

            PREFIX="${REPO}-${BRANCH}_"

            # Parse Replicas Config
            REPLICAS=1
            IFS=',' read -ra CONFIG_ARRAY <<< "${{ env.REPLICAS_CONFIG }}"
            for item in "${CONFIG_ARRAY[@]}"; do
              IFS=':' read -ra PAIR <<< "$item"
              if [[ "${PAIR[0]}" == "$BRANCH" ]]; then
                REPLICAS="${PAIR[1]}"
                break
              fi
            done

            echo "рџ”ў Replicas for $BRANCH: $REPLICAS"

            update_or_create_service() {
              SERVICE_NAME=$1
              COMMAND=$2
              SERVICE_REPLICAS=${3:-$REPLICAS}
            
              if docker service inspect ${SERVICE_NAME} >/dev/null 2>&1; then
                echo "рџ”„ Atualizando ${SERVICE_NAME}..."
                
                docker service update --force \
                  --image ${IMAGE} \
                  --replicas ${SERVICE_REPLICAS} \
                  --env-rm REDIS_PREFIX \
                  --env-rm CACHE_PREFIX \
                  --env-rm SESSION_PREFIX \
                  --env-rm HORIZON_PREFIX \
                  --env-add REDIS_PREFIX=${PREFIX} \
                  --env-add CACHE_PREFIX=${PREFIX}cache \
                  --env-add SESSION_PREFIX=${PREFIX}session \
                  --env-add HORIZON_PREFIX=${PREFIX}horizon: \
                  --update-order start-first \
                  --update-parallelism 1 \
                  --update-delay 3s \
                  ${SERVICE_NAME}
            
              else
                echo "рџљЂ Criando ${SERVICE_NAME}..."
                
                docker service create \
                  --name ${SERVICE_NAME} \
                  --replicas ${SERVICE_REPLICAS} \
                  --network web \
                  --host host.docker.internal:host-gateway \
                  --mount type=bind,src=${ENV_BASE},dst=/var/www/html/ \
                  --env REDIS_PREFIX=${PREFIX} \
                  --env CACHE_PREFIX=${PREFIX}cache \
                  --env SESSION_PREFIX=${PREFIX}session \
                  --env HORIZON_PREFIX=${PREFIX}horizon: \
                  ${IMAGE} ${COMMAND}
                fi
            }

            # --- WORKER ---
            update_or_create_service "${APP_NAME}-worker" "worker" 1

            # --- APP ---
            update_or_create_service "${APP_NAME}-app" ""

            echo "вњ… Deploy finalizado: $APP_NAME"