name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.number }}
      IMAGE_NAME: project-preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 BUILD
      - name: Build image
        if: github.event.action != 'closed'
        run: docker build -t $IMAGE_NAME .

      - name: Save image
        if: github.event.action != 'closed'
        run: |
          docker save $IMAGE_NAME -o image.tar
          sudo chown $USER:$USER image.tar

      # 🔐 SSH SETUP
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 🚚 COPY IMAGE
      - name: Copy image to server
        if: github.event.action != 'closed'
        run: |
          sudo apt-get update && sudo apt-get install -y rsync

          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            image.tar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/image-pr-${PR_NUMBER}.tar

      # 🚀 DEPLOY PREVIEW
      - name: Deploy preview
        if: github.event.action != 'closed'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker load < /tmp/image-pr-${PR_NUMBER}.tar

            # remove antigo
            docker rm -f project-pr-${PR_NUMBER} || true
            docker rm -f project-pr-${PR_NUMBER}-horizon || true

            # 🔥 APP
            docker run -d \
              --name project-pr-${PR_NUMBER} \
              --network web \
              --restart unless-stopped \
              -v ~/.env-test-digital-ocean:/var/www/html/.env \
              -e REDIS_PREFIX=pr_${PR_NUMBER}_ \
              -e CACHE_PREFIX=pr_${PR_NUMBER}_ \
              --add-host=host.docker.internal:host-gateway \
              -l traefik.enable=true \
              -l traefik.http.routers.project-pr-${PR_NUMBER}.rule=Host(`pr-${PR_NUMBER}.bhcosta90.dev.br`) \
              -l traefik.http.services.project-pr-${PR_NUMBER}.loadbalancer.server.port=80 \
              $IMAGE_NAME

            # 🔥 HORIZON
            docker run -d \
              --name project-pr-${PR_NUMBER}-horizon \
              --network web \
              --restart unless-stopped \
              -v ~/.env-test-digital-ocean:/var/www/html/.env \
              -e REDIS_PREFIX=pr_${PR_NUMBER}_ \
              -e CACHE_PREFIX=pr_${PR_NUMBER}_ \
              $IMAGE_NAME php artisan horizon

      # 🧹 CLEANUP (quando PR fecha)
      - name: Cleanup preview
        if: github.event.action == 'closed'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker rm -f project-pr-${{ github.event.number }} || true
            docker rm -f project-pr-${{ github.event.number }}-horizon || true

            # opcional: limpar redis
            redis-cli KEYS "pr_${{ github.event.number }}_*" | xargs -r redis-cli DEL