name: Deploy

on:
  push:
    branches: [main, sandbox, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            whoami

      - name: Build image
        run: docker build -t project-test --target app .

      - name: Save image
        run: |
          docker save project-test -o image.tar
          sudo chown $USER:$USER image.tar

      - name: Debug
        run: ls -lh image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy to server
        run: |
          sudo apt-get update && sudo apt-get install -y rsync
          
          # Copiar imagem
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            image.tar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/image.tar

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            BRANCH=${{ github.ref_name }}
            APP_NAME=project-test-$BRANCH

            docker load < /tmp/image.tar

            # Criar network se não existir
            docker network create web || true

            # Subir App isolado
            docker rm -f $APP_NAME || true
            docker run -d \
              --name $APP_NAME \
              --network web \
              -v ~/.env-test-digital-ocean:/var/www/html/.env \
              project-test

            # Worker isolado
            docker rm -f $APP_NAME-worker || true
            docker run -d \
              --name $APP_NAME-worker \
              --network web \
              --restart unless-stopped \
              -v ~/.env-test-digital-ocean:/var/www/html/.env \
              project-test worker